services:
  - type: web
    name: chatbot-ia
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_BASE_URL
        value: ""
      - key: OPENAI_APP_URL
        value: ""
      - key: OPENAI_APP_NAME
        value: Chatbot IA
      - key: OPENAI_API_KEY
        sync: false
