<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot IA</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Styles additionnels -->
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="mx-auto flex h-screen max-w-3xl flex-col">
        <header class="flex items-center justify-between border-b border-slate-200 bg-white px-6 py-4 shadow-sm">
            <div>
                <h1 class="text-xl font-semibold text-slate-900">Chatbot IA</h1>
                <p class="text-sm text-slate-500">Posez une question et obtenez une réponse instantanée.</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="clearMemory()" class="text-xs text-red-400 hover:text-red-600 transition">
                    🗑️ Effacer la mémoire
                </button>
                <div class="text-xs text-slate-400">Powered by FastAPI & Ollama</div>
            </div>
        </header>

        <main class="flex flex-1 flex-col overflow-hidden px-6 py-4">
            <div id="chat-box"
                class="chat-box flex-1 overflow-y-auto rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
            </div>

            <form id="chat-form" class="mt-4 flex gap-3">
                <input id="user-input"
                    class="flex-1 rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
                    type="text" autocomplete="off" placeholder="Posez votre question ici..."
                    aria-label="Votre question" />

                <button id="send-btn" type="submit"
                    class="inline-flex items-center justify-center rounded-xl bg-indigo-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-50">
                    Envoyer
                </button>
            </form>
        </main>

        <footer class="border-t border-slate-200 bg-white px-6 py-3 text-center text-xs text-slate-500">
            * L'API doit être démarrée sur <code>localhost:8000</code> pour fonctionner.
        </footer>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const form = document.getElementById('chat-form');

        const scrollToBottom = () => {
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        const addMessage = (role, text) => {
            const msg = document.createElement('div');
            msg.className = 'message rounded-2xl p-4 text-sm shadow-sm';
            msg.innerHTML = `
        <div class="font-medium text-slate-700">${role}</div>
        <div class="mt-1 text-slate-800">${text}</div>
      `;

            if (role === 'Moi') {
                msg.classList.add('self-end', 'bg-indigo-50', 'text-right');
            } else {
                msg.classList.add('self-start', 'bg-slate-50');
            }

            chatBox.appendChild(msg);
            scrollToBottom();
        };

        const setLoading = (isLoading) => {
            sendBtn.disabled = isLoading;
            userInput.disabled = isLoading;
            sendBtn.textContent = isLoading ? 'En cours…' : 'Envoyer';
        };

        const sendMessage = async (question) => {
            addMessage('Moi', question);
            setLoading(true);

            // Crée une bulle de message du bot et met à jour son contenu en streaming
            const botBubble = document.createElement('div');
            botBubble.className = 'message rounded-2xl p-4 text-sm shadow-sm self-start bg-slate-50';
            botBubble.innerHTML = `
        <div class="font-medium text-slate-700">Bot</div>
        <div class="mt-1 text-slate-800" id="bot-stream"></div>
      `;
            chatBox.appendChild(botBubble);
            scrollToBottom();

            const botStream = botBubble.querySelector('#bot-stream');
            const decoder = new TextDecoder();
            let buffer = '';

            try {
                const response = await fetch(`/chat?question=${encodeURIComponent(question)}`);
                if (!response.body) throw new Error('Streaming non supporté par le navigateur.');

                const reader = response.body.getReader();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const parsed = JSON.parse(line);
                            botStream.textContent += parsed.response ?? '';
                            scrollToBottom();
                        } catch {
                            // ignore malformed json chunks
                        }
                    }
                }

                // flush remaining
                if (buffer.trim()) {
                    try {
                        const parsed = JSON.parse(buffer);
                        botStream.textContent += parsed.response ?? '';
                    } catch {
                        // ignore
                    }
                }
            } catch (err) {
                botStream.textContent += 'Erreur de connexion: ' + err.message;
            } finally {
                setLoading(false);
            }
        };

        const clearMemory = async () => {
            await fetch('/memory', { method: 'DELETE' });
            chatBox.innerHTML = '';
        };

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            const question = userInput.value.trim();
            if (!question) return;
            userInput.value = '';
            sendMessage(question);
        });

        window.addEventListener('load', () => {
            userInput.focus();
            scrollToBottom();
        });
    </script>

</body>

</html>
